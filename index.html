<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고대 앞 뭐먹지? 🍜</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --blue:#2563EB;--blue-dark:#1D4ED8;--blue-light:#EFF6FF;--blue-border:#BFDBFE;
    --green:#059669;--green-light:#ECFDF5;--green-border:#A7F3D0;
    --amber:#D97706;--amber-light:#FFFBEB;--amber-border:#FDE68A;
    --red:#DC2626;--red-light:#FEF2F2;--red-border:#FECACA;
    --purple-light:#F5F3FF;--purple-border:#DDD6FE;--purple:#7C3AED;
    --pink-light:#FDF2F8;--pink-border:#FBCFE8;--pink:#BE185D;
    --gray-50:#F9FAFB;--gray-100:#F3F4F6;--gray-200:#E5E7EB;--gray-300:#D1D5DB;
    --gray-500:#6B7280;--gray-700:#374151;--gray-900:#111827;
    --radius:10px;--radius-lg:14px;--radius-pill:999px;
    --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
    --shadow-md:0 4px 12px rgba(0,0,0,.1);
  }
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;
    background:#F0F4FF;
    color:var(--gray-900);
    min-height:100vh;
    padding:20px 16px 60px;
  }
  .container{max-width:600px;margin:0 auto}

  /* HEADER */
  .app-header{text-align:center;margin-bottom:24px;padding-top:8px}
  .app-logo{font-size:36px;margin-bottom:6px}
  .app-title{font-size:24px;font-weight:700;color:var(--gray-900);letter-spacing:-.02em;margin-bottom:4px}
  .app-sub{font-size:13px;color:var(--gray-500);display:flex;align-items:center;justify-content:center;gap:4px}
  .badge-ku{background:var(--blue-light);color:var(--blue);font-size:11px;font-weight:600;padding:2px 8px;border-radius:var(--radius-pill);border:1px solid var(--blue-border)}

  /* CARDS */
  .card{background:#fff;border-radius:var(--radius-lg);border:1px solid var(--gray-200);padding:18px;margin-bottom:12px;box-shadow:var(--shadow)}
  .card-title{font-size:12px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;display:flex;align-items:center;gap:5px}

  /* FILTER BUTTONS */
  .filter-row{display:flex;gap:6px;flex-wrap:wrap}
  .filter-row+.filter-row{margin-top:8px}
  .fbtn{padding:7px 14px;border:1px solid var(--gray-200);border-radius:var(--radius-pill);background:#fff;color:var(--gray-700);font-size:13px;cursor:pointer;transition:all .15s;white-space:nowrap;font-family:inherit}
  .fbtn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-light)}
  .fbtn.active{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:500}
  .fbtn.excluded{background:var(--red-light);border-color:var(--red-border);color:var(--red)}

  /* RECOMMEND BUTTON */
  .btn-recommend{width:100%;padding:15px;background:var(--blue);border:none;border-radius:var(--radius-lg);color:#fff;font-size:16px;font-weight:600;cursor:pointer;letter-spacing:-.01em;transition:all .15s;font-family:inherit;margin-bottom:10px}
  .btn-recommend:hover{background:var(--blue-dark);transform:translateY(-1px);box-shadow:var(--shadow-md)}
  .btn-recommend:active{transform:translateY(0)}

  /* MESSAGE */
  .msg{padding:11px 14px;border-radius:var(--radius);font-size:13px;margin-bottom:10px;display:none;font-weight:500}
  .msg.show{display:block}
  .msg-warn{background:var(--amber-light);color:var(--amber);border:1px solid var(--amber-border)}
  .msg-success{background:var(--green-light);color:var(--green);border:1px solid var(--green-border)}

  /* RESULT CARD */
  .result-card{display:none;margin-bottom:12px}
  .result-card.show{display:block}
  .res-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px}
  .res-emoji{font-size:38px;line-height:1;flex-shrink:0}
  .res-info{flex:1;min-width:0}
  .res-name{font-size:20px;font-weight:700;color:var(--gray-900);letter-spacing:-.02em;margin-bottom:6px}
  .badges{display:flex;flex-wrap:wrap;gap:5px}
  .badge{padding:3px 9px;border-radius:var(--radius-pill);font-size:11px;font-weight:600}
  .b-cat{background:var(--blue-light);color:var(--blue);border:1px solid var(--blue-border)}
  .b-price{background:var(--amber-light);color:var(--amber);border:1px solid var(--amber-border)}
  .b-dist{background:var(--purple-light);color:var(--purple);border:1px solid var(--purple-border)}
  .b-people{background:var(--pink-light);color:var(--pink);border:1px solid var(--pink-border)}
  .b-rating{background:var(--green-light);color:var(--green);border:1px solid var(--green-border)}
  .res-divider{height:1px;background:var(--gray-100);margin:12px 0}
  .res-desc{font-size:13px;color:var(--gray-500);line-height:1.65;margin-bottom:12px}
  .menu-label{font-size:12px;font-weight:600;color:var(--gray-500);margin-bottom:7px;text-transform:uppercase;letter-spacing:.05em}
  .menu-items{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
  .menu-chip{padding:5px 11px;background:var(--gray-50);border:1px solid var(--gray-200);border-radius:var(--radius-pill);font-size:12px;color:var(--gray-700)}
  .res-footer{font-size:12px;color:var(--gray-500);display:flex;flex-direction:column;gap:4px;margin-bottom:14px}
  .res-footer span{display:flex;align-items:flex-start;gap:5px}
  .action-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .btn-reject{padding:11px;border:1px solid var(--gray-200);border-radius:var(--radius);background:#fff;color:var(--gray-700);font-size:14px;cursor:pointer;font-family:inherit;transition:all .15s;font-weight:500}
  .btn-reject:hover{border-color:var(--red-border);color:var(--red);background:var(--red-light)}
  .btn-decide{padding:11px;border:none;border-radius:var(--radius);background:var(--green);color:#fff;font-size:14px;cursor:pointer;font-family:inherit;font-weight:600;transition:all .15s}
  .btn-decide:hover{background:#047857}

  /* REVIEW */
  .review-header{font-size:15px;font-weight:600;margin-bottom:14px;color:var(--gray-900)}
  .review-header span{color:var(--blue)}
  .stars{display:flex;gap:7px;margin-bottom:14px}
  .star{font-size:26px;cursor:pointer;color:var(--gray-300);transition:color .1s;line-height:1}
  .star.on{color:#F59E0B}
  textarea{width:100%;padding:10px 12px;border:1px solid var(--gray-200);border-radius:var(--radius);background:#fff;color:var(--gray-900);font-size:14px;font-family:inherit;resize:none;outline:none;margin-bottom:10px;line-height:1.6}
  textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
  .btn-save{width:100%;padding:11px;background:var(--blue);border:none;border-radius:var(--radius);color:#fff;font-size:14px;cursor:pointer;font-family:inherit;font-weight:600;transition:all .15s}
  .btn-save:hover{background:var(--blue-dark)}

  /* TABS */
  .tabs{display:flex;gap:3px;background:var(--gray-100);border-radius:var(--radius);padding:3px;margin-bottom:12px}
  .tab{flex:1;padding:8px;border:none;background:transparent;color:var(--gray-500);font-size:13px;cursor:pointer;border-radius:8px;font-family:inherit;font-weight:500;transition:all .15s}
  .tab.active{background:#fff;color:var(--gray-900);box-shadow:var(--shadow)}
  .tab-pane{display:none}
  .tab-pane.show{display:block}

  /* REVIEW LIST */
  .review-item{padding:12px 0;border-bottom:1px solid var(--gray-100)}
  .review-item:last-child{border-bottom:none}
  .ri-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
  .ri-name{font-size:14px;font-weight:600;color:var(--gray-900)}
  .ri-stars{color:#F59E0B;font-size:13px;letter-spacing:1px}
  .ri-text{font-size:13px;color:var(--gray-500);line-height:1.55}
  .ri-date{font-size:11px;color:var(--gray-300);margin-top:3px}
  .empty{font-size:13px;color:var(--gray-300);text-align:center;padding:20px 0}

  /* AVG TABLE */
  .avg-row{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--gray-100)}
  .avg-row:last-child{border-bottom:none}
  .avg-name{font-size:13px;font-weight:500;flex:1;color:var(--gray-900)}
  .avg-bar-wrap{width:80px;height:5px;background:var(--gray-100);border-radius:3px;overflow:hidden}
  .avg-bar{height:100%;background:var(--amber);border-radius:3px;transition:width .4s}
  .avg-val{font-size:13px;color:var(--amber);font-weight:600;min-width:28px;text-align:right}
  .avg-cnt{font-size:11px;color:var(--gray-300);min-width:24px;text-align:right}

  @media(max-width:480px){
    .action-btns{grid-template-columns:1fr}
    .app-title{font-size:20px}
  }
</style>
</head>
<body>
<div class="container">

  <div class="app-header">
    <div class="app-logo">🍜</div>
    <div class="app-title">고대 앞 뭐먹지?</div>
    <div class="app-sub">
      <span class="badge-ku">📍 고려대 반경 500m</span>
      <span style="color:var(--gray-300)">·</span>
      <span>실제 식당 추천</span>
    </div>
  </div>

  <!-- 필터 -->
  <div class="card">
    <div class="card-title">👥 인원</div>
    <div class="filter-row">
      <button class="fbtn" onclick="setFilter('people','alone',this)">혼밥 🍜</button>
      <button class="fbtn" onclick="setFilter('people','group',this)">같이 🍽️</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">💰 예산</div>
    <div class="filter-row">
      <button class="fbtn" onclick="setFilter('budget','low',this)">5천원 이하</button>
      <button class="fbtn" onclick="setFilter('budget','mid',this)">1만원 이하</button>
      <button class="fbtn" onclick="setFilter('budget','any',this)">상관없음</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">🚶 거리</div>
    <div class="filter-row">
      <button class="fbtn" onclick="setFilter('dist','5min',this)">도보 5분</button>
      <button class="fbtn" onclick="setFilter('dist','10min',this)">도보 10분</button>
      <button class="fbtn" onclick="setFilter('dist','any',this)">상관없음</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">🚫 제외 카테고리 <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--gray-300);font-size:11px">(클릭하면 제외)</span></div>
    <div class="filter-row" id="cat-btns">
      <button class="fbtn" onclick="toggleCat('한식',this)">한식</button>
      <button class="fbtn" onclick="toggleCat('중식',this)">중식</button>
      <button class="fbtn" onclick="toggleCat('일식',this)">일식</button>
      <button class="fbtn" onclick="toggleCat('양식',this)">양식</button>
      <button class="fbtn" onclick="toggleCat('분식',this)">분식</button>
    </div>
  </div>

  <button class="btn-recommend" onclick="recommend()">🎲 오늘 뭐먹지?</button>
  <div class="msg msg-warn" id="msg-main"></div>

  <!-- 추천 결과 -->
  <div class="card result-card" id="result-card">
    <div class="res-top">
      <div class="res-emoji" id="res-emoji"></div>
      <div class="res-info">
        <div class="res-name" id="res-name"></div>
        <div class="badges" id="res-badges"></div>
      </div>
    </div>
    <div class="res-divider"></div>
    <div class="res-desc" id="res-desc"></div>
    <div class="menu-label">대표 메뉴</div>
    <div class="menu-items" id="res-menus"></div>
    <div class="res-footer" id="res-footer"></div>
    <div class="action-btns">
      <button class="btn-reject" onclick="reject()">😕 별로예요</button>
      <button class="btn-decide" onclick="decide()">✅ 이걸로 결정!</button>
    </div>
  </div>

  <!-- 리뷰 작성 -->
  <div class="card" id="review-card" style="display:none">
    <div class="review-header">후기 남기기 — <span id="decided-name"></span></div>
    <div class="card-title">별점</div>
    <div class="stars" id="stars">
      <span class="star" onclick="setStar(1)">★</span>
      <span class="star" onclick="setStar(2)">★</span>
      <span class="star" onclick="setStar(3)">★</span>
      <span class="star" onclick="setStar(4)">★</span>
      <span class="star" onclick="setStar(5)">★</span>
    </div>
    <textarea id="review-text" rows="2" placeholder="한 줄 후기를 남겨보세요..."></textarea>
    <button class="btn-save" onclick="saveReview()">💾 후기 저장</button>
    <div class="msg msg-warn" id="msg-review-warn" style="margin-top:8px"></div>
    <div class="msg msg-success" id="msg-review-ok" style="margin-top:8px"></div>
  </div>

  <!-- 기록 조회 -->
  <div style="margin-top:8px">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('list',this)">📋 저장된 후기</button>
      <button class="tab" onclick="switchTab('avg',this)">📊 평균 별점</button>
    </div>
    <div class="card" style="padding:12px 18px">
      <div class="tab-pane show" id="tab-list">
        <div id="review-list"><div class="empty">아직 저장된 후기가 없어요</div></div>
      </div>
      <div class="tab-pane" id="tab-avg">
        <div id="avg-list"><div class="empty">아직 저장된 후기가 없어요</div></div>
      </div>
    </div>
  </div>

</div>

   desc:"캠퍼스 내 교우회관 1층 식당. 조용한 미팅이나 식사에 적합. 방문 전 예약 권장.",

   desc:"학생회관 1층 치킨 프랜차이즈. 빠른 픽업 가능, 캠퍼스 내 위치.",
   hours:"영업시간 확인 필요",addr:"고려대학교 안암캠퍼스 학생회관 1층",rating:null},
];

const budgetLabel={low:"5천원 이하",mid:"1만원 이하",any:"상관없음"};
const distLabel={"5min":"도보 5분","10min":"도보 10분",any:"도보 10분+"};
const peopleLabel={alone:"혼밥",group:"같이",both:"혼밥·같이"};

let filters={people:null,budget:null,dist:null};
let excluded=new Set();
let seen=[];
let current=null;
let chosenName="";
let selectedStar=0;
let reviews=JSON.parse(localStorage.getItem('ku_reviews')||'[]');
function saveToStorage(){localStorage.setItem('ku_reviews',JSON.stringify(reviews));}

function setFilter(type,val,btn){
  const selector=type==='people'?'.fbtn[onclick*="people"]':type==='budget'?'.fbtn[onclick*="budget"]':'.fbtn[onclick*="dist"]';
  document.querySelectorAll(selector).forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  filters[type]=val;
}
function toggleCat(cat,btn){
  if(excluded.has(cat)){excluded.delete(cat);btn.classList.remove('excluded');}
  else{excluded.add(cat);btn.classList.add('excluded');}
}
function showMsg(id,text,duration=3000){
  const el=document.getElementById(id);
  el.textContent=text;el.classList.add('show');
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),duration);
}
function recommend(){
  if(!filters.people||!filters.budget||!filters.dist){showMsg('msg-main','인원·예산·거리를 모두 선택해주세요!');return;}
  const pool=restaurants.filter(r=>{
    if(excluded.has(r.cat))return false;
    if(r.people!=='both'&&r.people!==filters.people)return false;
    if(filters.budget==='low'&&r.budget!=='low')return false;
    if(filters.budget==='mid'&&r.budget==='any')return false;
    if(filters.dist==='5min'&&r.dist!=='5min')return false;
    return true;
  }).filter(r=>!seen.includes(r.id));
  if(pool.length===0){
    if(seen.length>0){showMsg('msg-main','모든 메뉴를 다 봤어요! 조건을 바꿔보세요 😅');seen=[];return;}
    showMsg('msg-main','조건에 맞는 식당이 없어요. 조건을 넓혀보세요!');return;
  }
  current=pool[Math.floor(Math.random()*pool.length)];
  seen.push(current.id);
  showResult(current);
  document.getElementById('review-card').style.display='none';
}
function showResult(r){
  document.getElementById('res-emoji').textContent=r.emoji;
  document.getElementById('res-name').textContent=r.name;
  document.getElementById('res-badges').innerHTML=
    `<span class="badge b-cat">${r.cat}</span>`+
    `<span class="badge b-price">${budgetLabel[r.budget]}</span>`+
    `<span class="badge b-dist">${distLabel[r.dist]}</span>`+
    `<span class="badge b-people">${peopleLabel[r.people]}</span>`+
    (r.rating?`<span class="badge b-rating">⭐ ${r.rating}</span>`:'');
  document.getElementById('res-desc').textContent=r.desc;
  document.getElementById('res-menus').innerHTML=r.menus.map(m=>`<span class="menu-chip">${m}</span>`).join('');
  document.getElementById('res-footer').innerHTML=
    `<span>🕐 ${r.hours}</span><span>📍 ${r.addr}</span>`;
  document.getElementById('result-card').classList.add('show');
  document.getElementById('result-card').scrollIntoView({behavior:'smooth',block:'nearest'});
}
function reject(){recommend();}
function decide(){
  if(!current)return;
  chosenName=current.name;
  document.getElementById('decided-name').textContent=chosenName;
  document.getElementById('result-card').classList.remove('show');
  document.getElementById('review-card').style.display='block';
  selectedStar=0;
  document.querySelectorAll('.star').forEach(s=>s.classList.remove('on'));
  document.getElementById('review-text').value='';
  document.getElementById('review-card').scrollIntoView({behavior:'smooth',block:'nearest'});
}
function setStar(n){
  selectedStar=n;
  document.querySelectorAll('.star').forEach((s,i)=>i<n?s.classList.add('on'):s.classList.remove('on'));
}
function saveReview(){
  if(!selectedStar){showMsg('msg-review-warn','별점을 선택해주세요!');return;}
  const text=document.getElementById('review-text').value.trim();
  const now=new Date();
  const d=now.getFullYear()+'.'+(now.getMonth()+1).toString().padStart(2,'0')+'.'+now.getDate().toString().padStart(2,'0');
  reviews.unshift({name:chosenName,star:selectedStar,text:text||'(후기 없음)',date:d});
  saveToStorage();
  showMsg('msg-review-ok','후기가 저장되었습니다 ✓',2500);
  document.getElementById('review-card').style.display='none';
  renderReviews();
}
function renderReviews(){
  const listEl=document.getElementById('review-list');
  if(!reviews.length){listEl.innerHTML='<div class="empty">아직 저장된 후기가 없어요</div>';
  }else{
    listEl.innerHTML=reviews.map(r=>`
      <div class="review-item">
        <div class="ri-top"><span class="ri-name">${r.name}</span><span class="ri-stars">${'★'.repeat(r.star)}${'☆'.repeat(5-r.star)}</span></div>
        <div class="ri-text">${r.text}</div>
        <div class="ri-date">${r.date}</div>
      </div>`).join('');
  }
  const avgEl=document.getElementById('avg-list');
  const map={};
  reviews.forEach(r=>{if(!map[r.name])map[r.name]={sum:0,cnt:0};map[r.name].sum+=r.star;map[r.name].cnt++;});
  const sorted=Object.entries(map).sort((a,b)=>b[1].sum/b[1].cnt-a[1].sum/a[1].cnt);
  if(!sorted.length){avgEl.innerHTML='<div class="empty">아직 저장된 후기가 없어요</div>';}
  else{
    avgEl.innerHTML=sorted.map(([name,v])=>{
      const avg=(v.sum/v.cnt).toFixed(1);
      const pct=Math.round(parseFloat(avg)/5*100);
      return`<div class="avg-row">
        <span class="avg-name">${name}</span>
        <div class="avg-bar-wrap"><div class="avg-bar" style="width:${pct}%"></div></div>
        <span class="avg-val">${avg}</span>
        <span class="avg-cnt">${v.cnt}회</span>
      </div>`;
    }).join('');
  }
}
function switchTab(tab,btn){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('show'));
  btn.classList.add('active');
  document.getElementById('tab-'+tab).classList.add('show');
}
renderReviews();
</script>
